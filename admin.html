<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | ROSSO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600&family=Zen+Maru+Gothic:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

  <header class="admin-header">
    <span class="logo-text">ROSSO 管理画面</span>
    <a href="index.html" class="admin-back-link">← サイトトップへ</a>
  </header>

  <main class="admin-main">
    <div class="admin-wrapper">

      <h1 class="admin-page-title">予約一覧</h1>

      <!-- フィルター -->
      <div class="admin-filters">
        <div class="filter-group">
          <label>期間</label>
          <input type="date" id="filterFrom">
          <span>〜</span>
          <input type="date" id="filterTo">
        </div>
        <div class="filter-group">
          <label>ステータス</label>
          <select id="filterStatus">
            <option value="">すべて</option>
            <option value="confirmed">確定</option>
            <option value="cancelled">キャンセル</option>
          </select>
        </div>
        <button class="btn-filter" id="applyFilter">絞り込む</button>
        <button class="btn-reload" id="reloadBtn">↺ 再読み込み</button>
      </div>

      <!-- サマリー -->
      <div class="admin-summary">
        <div class="summary-card">
          <span class="summary-num" id="totalCount">-</span>
          <span class="summary-label">今週の予約</span>
        </div>
        <div class="summary-card">
          <span class="summary-num" id="todayCount">-</span>
          <span class="summary-label">本日の予約</span>
        </div>
        <div class="summary-card">
          <span class="summary-num" id="pendingCount">-</span>
          <span class="summary-label">未確認</span>
        </div>
      </div>

      <!-- テーブル -->
      <div class="admin-table-wrap">
        <table class="admin-table" id="reservationTable">
          <thead>
            <tr>
              <th>日時</th>
              <th>お名前</th>
              <th>電話番号</th>
              <th>メニュー</th>
              <th>備考</th>
              <th>受付日時</th>
              <th>ステータス</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="7" class="loading-row">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
